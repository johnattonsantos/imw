<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Fluxograma do Módulo EBD</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 24px; color: #1f2937; }
    h1 { margin: 0 0 8px 0; font-size: 24px; }
    p { margin: 0 0 16px 0; font-size: 13px; color: #374151; }
    .legend { margin-top: 14px; font-size: 12px; color: #4b5563; }
    .box { fill: #f8fafc; stroke: #2563eb; stroke-width: 1.3; rx: 8; ry: 8; }
    .group { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 1.4; rx: 12; ry: 12; }
    .txt { font-size: 12px; fill: #111827; }
    .title { font-size: 13px; font-weight: bold; fill: #1e3a8a; }
    .arrow { stroke: #334155; stroke-width: 1.3; fill: none; marker-end: url(#arrow); }
  </style>
</head>
<body>
  <h1>Fluxograma do Módulo EBD</h1>
  <p>Visão funcional consolidada (Igreja + Regional), baseada nas rotas e fluxos atuais do sistema.</p>

  <svg width="1500" height="980" viewBox="0 0 1500 980" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
      </marker>
    </defs>

    <!-- Top flow -->
    <rect class="box" x="70" y="40" width="190" height="48" />
    <text class="txt" x="165" y="69" text-anchor="middle">Início / Usuário Logado</text>

    <rect class="box" x="320" y="40" width="190" height="48" />
    <text class="txt" x="415" y="69" text-anchor="middle">Acessa Módulo EBD</text>

    <rect class="box" x="570" y="40" width="210" height="48" />
    <text class="txt" x="675" y="69" text-anchor="middle">Dashboard EBD</text>

    <line class="arrow" x1="260" y1="64" x2="320" y2="64" />
    <line class="arrow" x1="510" y1="64" x2="570" y2="64" />

    <!-- Member search -->
    <rect class="group" x="70" y="130" width="360" height="130" />
    <text class="title" x="90" y="155">Entrada de Pessoas na EBD</text>

    <rect class="box" x="95" y="170" width="160" height="44" />
    <text class="txt" x="175" y="196" text-anchor="middle">Buscar Membro</text>

    <rect class="box" x="270" y="170" width="140" height="44" />
    <text class="txt" x="340" y="196" text-anchor="middle">Cadastrar Visitante</text>

    <rect class="box" x="95" y="220" width="315" height="28" />
    <text class="txt" x="252" y="239" text-anchor="middle">Retorna membro para cadastro em Aluno/Professor/Liderança</text>

    <!-- Cadastros base -->
    <rect class="group" x="470" y="130" width="560" height="210" />
    <text class="title" x="490" y="155">Cadastros Base da EBD (Nível Igreja)</text>

    <rect class="box" x="500" y="175" width="120" height="46" />
    <text class="txt" x="560" y="203" text-anchor="middle">Liderança</text>

    <rect class="box" x="640" y="175" width="120" height="46" />
    <text class="txt" x="700" y="203" text-anchor="middle">Professores</text>

    <rect class="box" x="780" y="175" width="120" height="46" />
    <text class="txt" x="840" y="203" text-anchor="middle">Alunos</text>

    <rect class="box" x="920" y="175" width="120" height="46" />
    <text class="txt" x="980" y="203" text-anchor="middle">Classes</text>

    <rect class="box" x="640" y="250" width="270" height="52" />
    <text class="txt" x="775" y="274" text-anchor="middle">Turmas</text>
    <text class="txt" x="775" y="291" text-anchor="middle">(Classe + Professor + Alunos)</text>

    <line class="arrow" x1="560" y1="221" x2="700" y2="250" />
    <line class="arrow" x1="700" y1="221" x2="730" y2="250" />
    <line class="arrow" x1="840" y1="221" x2="820" y2="250" />
    <line class="arrow" x1="980" y1="221" x2="860" y2="250" />

    <line class="arrow" x1="410" y1="235" x2="500" y2="198" />
    <line class="arrow" x1="410" y1="235" x2="640" y2="198" />
    <line class="arrow" x1="410" y1="235" x2="780" y2="198" />

    <line class="arrow" x1="675" y1="88" x2="675" y2="130" />

    <!-- Operações -->
    <rect class="group" x="470" y="370" width="560" height="200" />
    <text class="title" x="490" y="395">Operações da EBD</text>

    <rect class="box" x="510" y="420" width="240" height="62" />
    <text class="txt" x="630" y="446" text-anchor="middle">Diário de Aula</text>
    <text class="txt" x="630" y="464" text-anchor="middle">(data, hora início/fim, período, presença)</text>

    <rect class="box" x="770" y="420" width="230" height="62" />
    <text class="txt" x="885" y="446" text-anchor="middle">Agenda EBD</text>
    <text class="txt" x="885" y="464" text-anchor="middle">(evento geral ou por turma)</text>

    <line class="arrow" x1="775" y1="302" x2="775" y2="370" />
    <line class="arrow" x1="775" y1="302" x2="630" y2="420" />
    <line class="arrow" x1="775" y1="302" x2="885" y2="420" />

    <!-- Reports church -->
    <rect class="group" x="60" y="610" width="680" height="320" />
    <text class="title" x="80" y="635">Relatórios EBD - Nível Igreja</text>

    <rect class="box" x="90" y="660" width="145" height="42" /><text class="txt" x="162" y="686" text-anchor="middle">Lista de EBD</text>
    <rect class="box" x="250" y="660" width="145" height="42" /><text class="txt" x="322" y="686" text-anchor="middle">Alunos</text>
    <rect class="box" x="410" y="660" width="145" height="42" /><text class="txt" x="482" y="686" text-anchor="middle">Professores</text>
    <rect class="box" x="570" y="660" width="145" height="42" /><text class="txt" x="642" y="686" text-anchor="middle">Liderança</text>

    <rect class="box" x="90" y="725" width="145" height="42" /><text class="txt" x="162" y="751" text-anchor="middle">Classes</text>
    <rect class="box" x="250" y="725" width="145" height="42" /><text class="txt" x="322" y="751" text-anchor="middle">Turmas</text>
    <rect class="box" x="410" y="725" width="145" height="42" /><text class="txt" x="482" y="751" text-anchor="middle">Diário</text>
    <rect class="box" x="570" y="725" width="145" height="42" /><text class="txt" x="642" y="751" text-anchor="middle">Agenda</text>

    <rect class="box" x="90" y="790" width="625" height="60" />
    <text class="txt" x="402" y="815" text-anchor="middle">Filtros (conforme relatório): status, busca, turma, classe, ano, semestre, período, datas...</text>
    <text class="txt" x="402" y="835" text-anchor="middle">Escopo: dados da igreja local logada</text>

    <!-- Reports regional -->
    <rect class="group" x="770" y="610" width="680" height="320" />
    <text class="title" x="790" y="635">Relatórios EBD - Nível Regional</text>

    <rect class="box" x="800" y="660" width="145" height="42" /><text class="txt" x="872" y="686" text-anchor="middle">Lista de EBD</text>
    <rect class="box" x="960" y="660" width="145" height="42" /><text class="txt" x="1032" y="686" text-anchor="middle">Alunos</text>
    <rect class="box" x="1120" y="660" width="145" height="42" /><text class="txt" x="1192" y="686" text-anchor="middle">Professores</text>
    <rect class="box" x="1280" y="660" width="145" height="42" /><text class="txt" x="1352" y="686" text-anchor="middle">Liderança</text>

    <rect class="box" x="800" y="725" width="145" height="42" /><text class="txt" x="872" y="751" text-anchor="middle">Classes</text>
    <rect class="box" x="960" y="725" width="145" height="42" /><text class="txt" x="1032" y="751" text-anchor="middle">Turmas</text>
    <rect class="box" x="1120" y="725" width="145" height="42" /><text class="txt" x="1192" y="751" text-anchor="middle">Diário</text>
    <rect class="box" x="1280" y="725" width="145" height="42" /><text class="txt" x="1352" y="751" text-anchor="middle">Agenda</text>

    <rect class="box" x="800" y="790" width="625" height="60" />
    <text class="txt" x="1112" y="815" text-anchor="middle">Filtros regionais + filtros de negócio (status, busca, turma, datas etc.)</text>
    <text class="txt" x="1112" y="835" text-anchor="middle">Escopo: apenas igrejas permitidas pela região logada (distrito/igreja)</text>

    <line class="arrow" x1="630" y1="482" x2="400" y2="610" />
    <line class="arrow" x1="885" y1="482" x2="1110" y2="610" />
  </svg>

  <p class="legend"><strong>Legenda:</strong> caixas azuis claras = grupos funcionais; caixas brancas = funcionalidades/telas principais.</p>
</body>
</html>
